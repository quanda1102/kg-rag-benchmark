# experiments/baseline.yaml
# First experiment: heading chunker + Qwen3-Embedding-0.6B + cypher_llm + rrf
# Run with: python -m eval.run --config experiments/baseline.yaml

name: baseline
description: "Heading chunker, Qwen3-Embedding-0.6B, Cypher LLM traversal, RRF reranking"

chunking:
  strategy: heading
  # sliding_window only:
  # chunk_size: 512
  # overlap: 64

embedding:
  model: Qwen/Qwen3-Embedding-0.6B

graph:
  traversal: cypher_llm      # bfs | predefined | cypher_llm
  bfs_depth: 3               # unused when cypher_llm

reranking:
  strategy: rrf
  rrf_k: 60
  top_k: 5

neo4j:
  uri: bolt://localhost:7687
  username: neo4j
  password: Aikido202

llm:
  model: gpt-5.4-mini
  extraction_max_tokens: 2048
  judge_max_tokens: 512

eval:
  questions_path: eval/questions.json
  results_dir: results/