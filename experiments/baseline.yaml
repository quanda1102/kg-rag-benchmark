# experiments/baseline.yaml
# First experiment: heading chunker + bge-m3 + bfs + rrf
# Run with: python -m eval.run --config experiments/baseline.yaml

name: baseline
description: "Heading chunker, bge-m3 embedding, BFS traversal, RRF reranking"

chunking:
  strategy: heading          # heading | sliding_window
  # sliding_window only:
  # chunk_size: 512
  # overlap: 64

embedding:
  model: BAAI/bge-m3         # large multilingual, good for Vietnamese+English
  # alternatives:
  # model: BAAI/bge-small-en-v1.5   # small general
  # model: intfloat/multilingual-e5-large  # vietnamese-optimized

graph:
  traversal: bfs             # bfs | predefined | cypher_llm
  bfs_depth: 3               # only used when traversal: bfs

reranking:
  strategy: rrf              # rrf | cross_encoder | llm
  rrf_k: 60                  # only used when strategy: rrf
  top_k: 5                   # final number of passages to assemble

neo4j:
  uri: bolt://localhost:7687
  username: neo4j
  password: Aikido202

llm:
  model: gpt-5.4
  extraction_max_tokens: 2048
  judge_max_tokens: 512

eval:
  questions_path: eval/questions.json
  results_dir: results/